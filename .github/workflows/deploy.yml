name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [ closed ]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
        coverage: none

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Execute tests (Unit and Feature tests) via PHPUnit
      run: vendor/bin/phpunit

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install PHP Dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction

    - name: Install NPM Dependencies
      run: npm ci

    - name: Build Assets
      run: npm run build

    - name: Prepare Deployment Files
      run: |
        # Remove development files
        rm -rf .git
        rm -rf node_modules
        rm -rf tests
        rm -rf .github
        rm -f .env.example
        rm -f .gitignore
        rm -f composer.lock
        rm -f package-lock.json
        rm -f vite.config.js
        rm -f tailwind.config.js
        rm -f postcss.config.js
        rm -f DEPLOY*.md
        rm -f OVERVIEW.md
        rm -f README.md
        rm -f FILE-LIST.txt
        rm -f brand-assets.md
        rm -f remote-deploy.bat
        rm -f server-setup.sh
        
        # Create deployment archive
        tar -czf deploy.tar.gz .

    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || '22' }}
        source: "deploy.tar.gz"
        target: "/var/www/cosens/tmp"
        overwrite: true

    - name: Execute Remote Deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || '22' }}
        script: |
          cd /var/www/cosens
          
          # Create backup
          echo "Creating backup..."
          BACKUP_DIR="/var/www/backups"
          mkdir -p $BACKUP_DIR
          tar -czf "$BACKUP_DIR/cosens-backup-$(date +%Y%m%d-%H%M%S).tar.gz" . \
            --exclude='tmp' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*'
          
          # Clean old backups (keep last 5)
          cd $BACKUP_DIR && ls -t cosens-backup-*.tar.gz | tail -n +6 | xargs -r rm
          
          # Extract new files
          echo "Extracting new files..."
          cd /var/www/cosens
          tar -xzf tmp/deploy.tar.gz -C /var/www/cosens-new --overwrite
          
          # Preserve storage and .env
          echo "Preserving data..."
          cp -r storage /var/www/cosens-new/
          cp .env /var/www/cosens-new/
          
          # Update directory
          cd /var/www
          mv cosens cosens-old
          mv cosens-new cosens
          rm -rf cosens-old
          
          # Set permissions
          echo "Setting permissions..."
          chown -R www-data:www-data /var/www/cosens
          chmod -R 755 /var/www/cosens/storage
          chmod -R 755 /var/www/cosens/bootstrap/cache
          
          # Run deployment commands
          echo "Running deployment..."
          cd /var/www/cosens
          php artisan migrate --force
          php artisan optimize:clear
          php artisan optimize
          php artisan storage:link
          php artisan view:cache
          php artisan config:cache
          php artisan route:cache
          
          # Restart services
          echo "Restarting services..."
          sudo systemctl reload nginx
          sudo systemctl restart php8.3-fpm
          
          # Cleanup
          rm -f /var/www/cosens/tmp/deploy.tar.gz
          
          echo "Deployment completed successfully!"

    - name: Notify Deployment Success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: '🚀 Cosens website deployed successfully!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true

    - name: Notify Deployment Failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: '❌ Cosens website deployment failed!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true
