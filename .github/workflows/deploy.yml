name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare Deployment Files
      run: |
        # Create deployment archive with all project files
        # Output to /tmp/ to avoid tar including the archive itself
        tar -czf /tmp/deploy.tar.gz \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.github' \
          --exclude='cosens-deploy.zip' \
          .
        
        echo "Archive created successfully"
        ls -lh /tmp/deploy.tar.gz
        
        # Move to workspace for upload
        mv /tmp/deploy.tar.gz deploy.tar.gz

    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || '22' }}
        source: "deploy.tar.gz"
        target: "/var/www/"
        overwrite: true

    - name: Execute Remote Deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || '22' }}
        script: |
          set -e
          
          echo "========================================"
          echo "  Starting Deployment"
          echo "  Time: $(date)"
          echo "========================================"
          
          # Create project directory if not exists
          mkdir -p /var/www/watertank
          cd /var/www/watertank
          
          # Create backup if directory is not empty
          if [ "$(ls -A . 2>/dev/null | grep -v 'tmp\|backup' | wc -l)" -gt 0 ]; then
            echo "Creating backup..."
            BACKUP_DIR="/var/www/backups"
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/watertank-backup-$(date +%Y%m%d-%H%M%S).tar.gz"
            tar -czf "$BACKUP_FILE" . \
              --exclude='tmp' \
              --exclude='storage/logs' \
              --exclude='storage/framework/cache' \
              --exclude='storage/framework/sessions' \
              --exclude='storage/framework/views' \
              --exclude='vendor' \
              --exclude='node_modules' 2>/dev/null || true
            echo "Backup created: $BACKUP_FILE"
            
            # Clean old backups (keep last 5)
            cd $BACKUP_DIR && ls -t watertank-backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm 2>/dev/null || true
            cd /var/www/watertank
          fi
          
          # Save important files before extraction
          echo "Saving configuration files..."
          [ -f ".env" ] && cp .env /tmp/watertank-env-backup
          [ -d "storage" ] && cp -r storage /tmp/watertank-storage-backup
          
          # Extract new files
          echo "Extracting new files..."
          tar -xzf /var/www/deploy.tar.gz --overwrite
          rm -f /var/www/deploy.tar.gz
          
          # Restore configuration files
          echo "Restoring configuration..."
          [ -f "/tmp/watertank-env-backup" ] && cp /tmp/watertank-env-backup .env
          [ -d "/tmp/watertank-storage-backup" ] && cp -r /tmp/watertank-storage-backup/* storage/ 2>/dev/null || true
          
          # Ensure .env exists
          if [ ! -f ".env" ]; then
            echo "Creating .env file..."
            cp .env.example .env
            php artisan key:generate 2>/dev/null || true
          fi
          
          # Set correct permissions
          echo "Setting permissions..."
          # Use root as web user (adjust if your server uses nginx/apache user)
          chown -R root:root /var/www/watertank || true
          chmod -R 755 /var/www/watertank
          chmod -R 775 /var/www/watertank/storage 2>/dev/null || true
          chmod -R 775 /var/www/watertank/bootstrap/cache 2>/dev/null || true
          
          # Install dependencies if composer.json exists
          if [ -f "composer.json" ]; then
            echo "Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction 2>/dev/null || echo "Composer install skipped (may not be needed)"
          fi
          
          # Optimize Laravel if artisan exists
          if [ -f "artisan" ]; then
            echo "Optimizing Laravel..."
            php artisan optimize:clear 2>/dev/null || true
            php artisan optimize 2>/dev/null || true
            php artisan storage:link 2>/dev/null || true
            php artisan view:cache 2>/dev/null || true
            php artisan config:cache 2>/dev/null || true
            php artisan route:cache 2>/dev/null || true
          fi
          
          # Restart services
          echo "Restarting services..."
          systemctl reload nginx 2>/dev/null || true
          systemctl restart php8.3-fpm 2>/dev/null || true
          
          # Cleanup
          rm -f /tmp/watertank-env-backup
          rm -rf /tmp/watertank-storage-backup
          
          echo ""
          echo "========================================"
          echo "  Deployment completed successfully!"
          echo "  Time: $(date)"
          echo "========================================"
          echo ""
          echo "Website: https://watertank.cosens.cn"
          echo "Admin: https://watertank.cosens.cn/admin"

